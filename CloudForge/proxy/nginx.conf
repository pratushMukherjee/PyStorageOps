# CloudForge Reverse Proxy Configuration
# Routes traffic to deployed containers and platform services.

upstream cloudforge_api {
    server api:8080;
}

upstream cloudforge_ai {
    server ai:8081;
}

server {
    listen 80;
    server_name localhost;

    # API server
    location /api/ {
        proxy_pass http://cloudforge_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check
    location /health {
        proxy_pass http://cloudforge_api;
    }

    # AI service
    location /api/v1/ai/ {
        proxy_pass http://cloudforge_ai;
        proxy_set_header Host $host;
        proxy_read_timeout 60s;
    }

    # Dashboard (static files)
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Deployed app routing — apps are available at /app/<name>/
    # Dynamic upstream is resolved by the API server's port mapping
    location ~ ^/app/(?<appname>[^/]+)(?<apppath>/.*)$ {
        resolver 127.0.0.11 valid=10s;
        set $target http://$appname:8000;
        proxy_pass $target$apppath;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Error pages
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}
