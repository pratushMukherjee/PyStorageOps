<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudForge Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-content">
            <h1>CloudForge</h1>
            <span class="subtitle">Cloud Deployment Platform</span>
        </div>
    </header>

    <main>
        <div class="grid">
            <!-- Apps Panel -->
            <section class="panel" id="apps-panel">
                <div class="panel-header">
                    <h2>Applications</h2>
                    <button id="create-app-btn" class="btn btn-primary">+ New App</button>
                </div>
                <div id="apps-list" class="list"></div>
            </section>

            <!-- App Detail Panel -->
            <section class="panel" id="detail-panel">
                <div class="panel-header">
                    <h2 id="detail-title">Select an app</h2>
                    <div class="btn-group">
                        <button id="deploy-btn" class="btn btn-success" disabled>Deploy</button>
                        <button id="rollback-btn" class="btn btn-warning" disabled>Rollback</button>
                        <button id="delete-btn" class="btn btn-danger" disabled>Delete</button>
                    </div>
                </div>
                <div id="app-info" class="info-grid"></div>

                <h3>Deployments</h3>
                <div id="deployments-list" class="list"></div>

                <h3>Logs</h3>
                <div id="logs-container" class="logs"></div>
            </section>

            <!-- AI Assistant Panel -->
            <section class="panel" id="ai-panel">
                <div class="panel-header">
                    <h2>AI Assistant</h2>
                </div>
                <div id="chat-messages" class="chat-messages"></div>
                <div class="chat-input">
                    <input type="text" id="chat-input" placeholder="Ask about deployment, errors, optimization...">
                    <button id="chat-send" class="btn btn-primary">Send</button>
                </div>
            </section>
        </div>
    </main>

    <!-- Create App Modal -->
    <div id="create-modal" class="modal hidden">
        <div class="modal-content">
            <h2>Create New App</h2>
            <form id="create-form">
                <label>App Name
                    <input type="text" id="app-name" required placeholder="my-api">
                </label>
                <label>Language
                    <select id="app-language">
                        <option value="python">Python</option>
                        <option value="node">Node.js</option>
                        <option value="go">Go</option>
                        <option value="java">Java</option>
                    </select>
                </label>
                <div class="btn-group">
                    <button type="submit" class="btn btn-primary">Create</button>
                    <button type="button" id="cancel-modal" class="btn">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
