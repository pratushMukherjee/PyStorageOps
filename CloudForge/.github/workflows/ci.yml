name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Lint Python code
        run: |
          pip install ruff
          ruff check ai-service/ buildpacks/ cli/ tests/

  lint-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"
      - name: Lint Go code
        run: |
          cd server
          go vet ./...

  test-python:
    runs-on: ubuntu-latest
    needs: lint-python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies and test
        run: |
          pip install -r ai-service/requirements.txt
          pip install pytest httpx
          python -m pytest tests/ -v --tb=short

  test-go:
    runs-on: ubuntu-latest
    needs: lint-go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"
      - name: Run Go tests
        run: |
          cd server
          go test ./... -v -cover

  build-docker:
    runs-on: ubuntu-latest
    needs: [test-python, test-go]
    steps:
      - uses: actions/checkout@v4
      - name: Build API server image
        run: docker build -f Dockerfile.server -t cloudforge/api:test .
      - name: Build AI service image
        run: docker build -f Dockerfile.ai -t cloudforge/ai:test .
      - name: Start and verify stack
        run: |
          docker-compose up -d
          sleep 5
          curl -f http://localhost:8080/health || exit 1
          curl -f http://localhost:8081/health || exit 1
          docker-compose down
