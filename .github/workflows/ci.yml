name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install ruff
      - name: Run linter
        run: ruff check src/ tests/

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e ".[dev]"
      - name: Run tests with coverage
        run: |
          python -m pytest tests/ -v --cov=src --cov-report=xml --cov-report=term-missing
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  build-c:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build C extensions
        run: |
          cd c_extensions
          make
      - name: Verify shared library
        run: |
          ls -la c_extensions/libstorageops.so
          file c_extensions/libstorageops.so

  docker:
    runs-on: ubuntu-latest
    needs: [test, build-c]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t pystorageops:test .
      - name: Test container starts
        run: |
          docker run -d --name test-app -p 8000:8000 pystorageops:test
          sleep 5
          curl -f http://localhost:8000/health || exit 1
          docker stop test-app
