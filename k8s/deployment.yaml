apiVersion: apps/v1
kind: Deployment
metadata:
  name: pystorageops
  labels:
    app: pystorageops
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pystorageops
  template:
    metadata:
      labels:
        app: pystorageops
    spec:
      containers:
        - name: pystorageops
          image: pystorageops:latest
          ports:
            - containerPort: 8000
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "250m"
            limits:
              memory: "256Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: pystorageops
spec:
  selector:
    app: pystorageops
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: LoadBalancer
