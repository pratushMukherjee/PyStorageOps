# PyStorageOps Configuration

server:
  host: "0.0.0.0"
  port: 8000
  workers: 4

storage:
  default_block_size: 4096
  max_volumes: 100
  max_blocks_per_volume: 1000000

health:
  utilization_warn_pct: 80
  utilization_crit_pct: 95
  check_interval_seconds: 30

monitoring:
  prometheus_port: 9090
  metrics_path: "/metrics"

logging:
  level: "INFO"
  format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
