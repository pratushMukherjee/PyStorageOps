# Prometheus configuration for PyStorageOps

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "pystorageops"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["app:8000"]
        labels:
          environment: "development"
          service: "pystorageops"
